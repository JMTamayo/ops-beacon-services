services:
  postgres:
    build: ./postgres
    container_name: postgres
    restart: unless-stopped
    env_file:
      - ./postgres/config/.env
    environment:
      POSTGRES_PASSWORD_FILE: /run/postgres-config/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/config:/run/postgres-config:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  dth-11-processor:
    build:
      context: .
      dockerfile: dth-11-processor/Dockerfile
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./dth-11-processor/config.yml:/app/dth-11-processor/config.yml:ro

  bot-telegram:
    build: ./bot-telegram
    ports:
      - "8082:8000"
    environment:
      CONFIG_PATH: /app/config/config.yaml
    volumes:
      - ./bot-telegram/config/config.yaml:/app/config/config.yaml:ro

  portainer:
    build: ./portainer
    container_name: portainer
    restart: unless-stopped
    command:
      - --http-enabled
      - --admin-password-file
      - /run/portainer-config/admin_password
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
      - ./portainer/config:/run/portainer-config:ro

  ener-vault:
    build: ./ener-vault
    container_name: ener-vault
    restart: unless-stopped
    env_file:
      - ./ener-vault/config/.env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  portainer_data:
  postgres_data:
